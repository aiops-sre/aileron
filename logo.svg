<!-- ═══════════════════════════════════════════════════════════════════════
     5.  MONOCHROME  ·  logo-mono.svg
     Print, embossing, single-color embeds, watermarks
     All shapes use white — set CSS color: black for light contexts
     ═══════════════════════════════════════════════════════════════════════ -->

<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 300"
     width="1200" height="300"
     role="img" aria-label="Aileron">
  <title>Aileron</title>

  <!-- Icon mark (white fills, opacity-tiered for visual depth) -->
  <g transform="translate(30 20)">
    <!-- A letterform — full opacity base -->
    <path d="M130 240 L220 20 L255 20 L165 240 Z" fill="white" opacity="0.92"/>
    <path d="M340 240 L250 20 L285 20 L375 240 Z" fill="white" opacity="0.92"/>

    <!-- Graph edges — mid-opacity, drawn on top of legs for "embedded" look -->
    <g stroke="white" fill="none" stroke-linecap="round">
      <line x1="252" y1="72"  x2="182" y2="132" stroke-width="5.5" stroke-opacity="0.35"/>
      <line x1="252" y1="72"  x2="322" y2="132" stroke-width="5.5" stroke-opacity="0.35"/>
      <line x1="182" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-opacity="0.35"/>
      <line x1="322" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-opacity="0.35"/>
      <line x1="182" y1="132" x2="322" y2="132" stroke-width="6.5" stroke-opacity="0.42"/>
      <line x1="252" y1="72"  x2="252" y2="192" stroke-width="4"   stroke-opacity="0.28"/>
    </g>

    <!-- Nodes — solid white, punched out against leg fill -->
    <circle cx="252" cy="72"  r="9.5"  fill="white" opacity="1"/>
    <circle cx="182" cy="132" r="9.5"  fill="white" opacity="1"/>
    <circle cx="322" cy="132" r="9.5"  fill="white" opacity="1"/>
    <circle cx="252" cy="132" r="17"   fill="white" opacity="1"/>
    <circle cx="252" cy="192" r="11.5" fill="white" opacity="1"/>
  </g>

  <!-- Vertical separator -->
  <line x1="472" y1="48" x2="472" y2="252"
        stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Wordmark (white) -->
  <g transform="translate(504 88)">
    <text x="0" y="0"
          font-family="'Inter', 'DM Sans', 'Helvetica Neue', Arial, sans-serif"
          font-size="96" font-weight="800" letter-spacing="-3"
          fill="white">AILERON</text>

    <text x="4" y="52"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="20" font-weight="500" letter-spacing="8"
          fill="white" opacity="0.50">EVENT INTELLIGENCE</text>
  </g>
</svg>
