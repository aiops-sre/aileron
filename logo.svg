<?xml version="1.0" encoding="UTF-8"?>
<!--
  AILERON LOGO SYSTEM  ·  v2
  Base concept: A-letterform × correlation-diamond graph
  The graph's horizontal edge is the A's crossbar — dual meaning:
    A = brand initial, wing/delta shape
    Diamond graph = correlation engine: 2 sources → hub → root cause

  Dark-mode optimised (GitHub #0D1117, Linear, Vercel dark)
  All backgrounds transparent unless noted

  Files:
    logo-icon.svg        ·  420×260  ·  isolated mark, scales 16px→512px
    logo-horizontal.svg  ·  1200×300 ·  primary horizontal lockup
    logo-full.svg        ·  1200×320 ·  dark pill, tagline, badge
    logo-vertical.svg    ·  480×560  ·  stacked lockup
    logo-mono.svg        ·  1200×300 ·  all-white, currentColor-friendly
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     1.  ICON MARK  ·  logo-icon.svg
     Readable from 16px favicon to 512px app icon
     At ≤32px: reads as bold "A"  ·  At 64px+: graph structure emerges
     ═══════════════════════════════════════════════════════════════════════ -->

<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="120 10 275 245"
     width="275" height="245"
     role="img" aria-label="Aileron icon">
  <title>Aileron</title>
  <defs>
    <linearGradient id="ic-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="30%"  stop-color="#3B82F6"/>
      <stop offset="65%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Tight crisp glow — cleaner than stdDeviation=6 -->
    <filter id="ic-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Strong glow for hub node (root-cause focal point) -->
    <filter id="ic-hub" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── A letterform ─────────────────────────────────────── -->
  <!-- Left leg: outer (130,240)→(220,20), inner (165,240)→(255,20) -->
  <path d="M130 240 L220 20 L255 20 L165 240 Z" fill="url(#ic-g)"/>
  <!-- Right leg: mirror -->
  <path d="M340 240 L250 20 L285 20 L375 240 Z" fill="url(#ic-g)"/>

  <!-- ── Correlation diamond (graph crossbar of the A) ──── -->
  <!-- Edges — drawn with glow; crossbar is slightly heavier -->
  <g stroke="url(#ic-g)" fill="none" filter="url(#ic-glow)">
    <!-- Arms from apex to left/right nodes -->
    <line x1="252" y1="72"  x2="182" y2="132" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="252" y1="72"  x2="322" y2="132" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Arms from left/right to root-cause node -->
    <line x1="182" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="322" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Crossbar (= A's crossbar) — slightly heavier for emphasis -->
    <line x1="182" y1="132" x2="322" y2="132" stroke-width="6.5" stroke-linecap="round"/>
    <!-- Vertical spine -->
    <line x1="252" y1="72"  x2="252" y2="192" stroke-width="4"   stroke-linecap="round"/>
  </g>

  <!-- ── Event-source nodes (input signals, top & outer) ── -->
  <circle cx="252" cy="72"  r="9.5"  fill="url(#ic-g)" filter="url(#ic-glow)"/>
  <circle cx="182" cy="132" r="9.5"  fill="url(#ic-g)" filter="url(#ic-glow)"/>
  <circle cx="322" cy="132" r="9.5"  fill="url(#ic-g)" filter="url(#ic-glow)"/>

  <!-- ── Hub node (correlation engine, dominant center) ── -->
  <circle cx="252" cy="132" r="17"   fill="url(#ic-g)" filter="url(#ic-hub)"/>
  <circle cx="252" cy="132" r="8"    fill="white" opacity="0.22"/>

  <!-- ── Root-cause apex (identified root cause) ────────── -->
  <circle cx="252" cy="192" r="11.5" fill="url(#ic-g)" filter="url(#ic-hub)"/>
  <circle cx="252" cy="192" r="5"    fill="white" opacity="0.30"/>
</svg>


<!-- ═══════════════════════════════════════════════════════════════════════
     2.  HORIZONTAL LOCKUP  ·  logo-horizontal.svg
     Primary format: README headers, docs, nav bars, email footers
     ═══════════════════════════════════════════════════════════════════════ -->

<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 300"
     width="1200" height="300"
     role="img" aria-label="Aileron — Event Intelligence Platform">
  <title>Aileron</title>
  <defs>
    <linearGradient id="h-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="30%"  stop-color="#3B82F6"/>
      <stop offset="65%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="h-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="h-hub" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark (translate to center vertically in 300px canvas) -->
  <g transform="translate(30 20)">
    <path d="M130 240 L220 20 L255 20 L165 240 Z" fill="url(#h-g)"/>
    <path d="M340 240 L250 20 L285 20 L375 240 Z" fill="url(#h-g)"/>
    <g stroke="url(#h-g)" fill="none" filter="url(#h-glow)">
      <line x1="252" y1="72"  x2="182" y2="132" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="252" y1="72"  x2="322" y2="132" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="182" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="322" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="182" y1="132" x2="322" y2="132" stroke-width="6.5" stroke-linecap="round"/>
      <line x1="252" y1="72"  x2="252" y2="192" stroke-width="4"   stroke-linecap="round"/>
    </g>
    <circle cx="252" cy="72"  r="9.5"  fill="url(#h-g)" filter="url(#h-glow)"/>
    <circle cx="182" cy="132" r="9.5"  fill="url(#h-g)" filter="url(#h-glow)"/>
    <circle cx="322" cy="132" r="9.5"  fill="url(#h-g)" filter="url(#h-glow)"/>
    <circle cx="252" cy="132" r="17"   fill="url(#h-g)" filter="url(#h-hub)"/>
    <circle cx="252" cy="132" r="8"    fill="white" opacity="0.22"/>
    <circle cx="252" cy="192" r="11.5" fill="url(#h-g)" filter="url(#h-hub)"/>
    <circle cx="252" cy="192" r="5"    fill="white" opacity="0.30"/>
  </g>

  <!-- Vertical separator -->
  <line x1="472" y1="48" x2="472" y2="252"
        stroke="white" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Wordmark -->
  <g transform="translate(504 88)">
    <!-- Primary name -->
    <text x="0" y="0"
          font-family="'Inter', 'DM Sans', 'Helvetica Neue', Arial, sans-serif"
          font-size="96" font-weight="800" letter-spacing="-3"
          fill="#FFFFFF">AILERON</text>

    <!-- Category label -->
    <text x="4" y="52"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="20" font-weight="500" letter-spacing="8"
          fill="url(#h-g)" opacity="0.85">EVENT INTELLIGENCE</text>
  </g>
</svg>


<!-- ═══════════════════════════════════════════════════════════════════════
     3.  FULL LOGO WITH BACKGROUND  ·  logo-full.svg
     Standalone card, GitHub hero, pitch decks, product pages
     ═══════════════════════════════════════════════════════════════════════ -->

<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 320"
     width="1200" height="320"
     role="img" aria-label="Aileron — Event Intelligence Platform">
  <title>Aileron — Event Intelligence Platform</title>
  <defs>
    <linearGradient id="f-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="30%"  stop-color="#3B82F6"/>
      <stop offset="65%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Subtle background gradient -->
    <linearGradient id="f-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#08081A"/>
      <stop offset="100%" stop-color="#0D0B1E"/>
    </linearGradient>
    <!-- Accent glow for background border -->
    <linearGradient id="f-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="f-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-hub" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background card -->
  <rect width="1200" height="320" rx="20" fill="url(#f-bg)"/>
  <!-- Accent border -->
  <rect width="1200" height="320" rx="20"
        fill="none" stroke="url(#f-border)" stroke-width="1.5"/>

  <!-- Icon mark -->
  <g transform="translate(30 30)">
    <path d="M130 240 L220 20 L255 20 L165 240 Z" fill="url(#f-g)"/>
    <path d="M340 240 L250 20 L285 20 L375 240 Z" fill="url(#f-g)"/>
    <g stroke="url(#f-g)" fill="none" filter="url(#f-glow)">
      <line x1="252" y1="72"  x2="182" y2="132" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="252" y1="72"  x2="322" y2="132" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="182" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="322" y1="132" x2="252" y2="192" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="182" y1="132" x2="322" y2="132" stroke-width="6.5" stroke-linecap="round"/>
      <line x1="252" y1="72"  x2="252" y2="192" stroke-width="4"   stroke-linecap="round"/>
    </g>
    <circle cx="252" cy="72"  r="9.5"  fill="url(#f-g)" filter="url(#f-glow)"/>
    <circle cx="182" cy="132" r="9.5"  fill="url(#f-g)" filter="url(#f-glow)"/>
    <circle cx="322" cy="132" r="9.5"  fill="url(#f-g)" filter="url(#f-glow)"/>
    <circle cx="252" cy="132" r="17"   fill="url(#f-g)" filter="url(#f-hub)"/>
    <circle cx="252" cy="132" r="8"    fill="white" opacity="0.22"/>
    <circle cx="252" cy="192" r="11.5" fill="url(#f-g)" filter="url(#f-hub)"/>
    <circle cx="252" cy="192" r="5"    fill="white" opacity="0.30"/>
  </g>

  <!-- Vertical separator -->
  <line x1="472" y1="52" x2="472" y2="268"
        stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Wordmark block -->
  <g transform="translate(504 76)">
    <text x="0" y="0"
          font-family="'Inter', 'DM Sans', 'Helvetica Neue', Arial, sans-serif"
          font-size="96" font-weight="800" letter-spacing="-3"
          fill="#FFFFFF">AILERON</text>

    <text x="4" y="52"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="20" font-weight="500" letter-spacing="8"
          fill="url(#f-g)" opacity="0.85">EVENT INTELLIGENCE</text>

    <!-- Separator rule -->
    <line x1="0" y1="82" x2="620" y2="82"
          stroke="white" stroke-opacity="0.10" stroke-width="1"/>

    <!-- Product tagline -->
    <text x="0" y="118"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="18" font-weight="400" letter-spacing="0.3"
          fill="white" opacity="0.45">
      Correlate  ·  Explain  ·  Resolve  ·  Automate
    </text>
  </g>
</svg>


<!-- ═══════════════════════════════════════════════════════════════════════
     4.  VERTICAL STACKED  ·  logo-vertical.svg
     App store, square cards, compact social embeds
     ═══════════════════════════════════════════════════════════════════════ -->

<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 540"
     width="500" height="540"
     role="img" aria-label="Aileron">
  <title>Aileron</title>
  <defs>
    <linearGradient id="v-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00D4FF"/>
      <stop offset="30%"  stop-color="#3B82F6"/>
      <stop offset="65%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="v-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
