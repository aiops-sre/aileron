    <filter id="hf-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill (optional, for standalone display) -->
  <rect width="320" height="96" rx="14" fill="#0A0A14"/>

  <!-- Icon mark, 60×60, vertically centered -->
  <g transform="translate(18,18) scale(0.60)">
    <path d="M 12,22 C 32,17 68,17 88,22 L 63,65 C 57,62 43,62 37,65 Z"
          fill="url(#hf-wing)"/>
    <path d="M 37,65 C 43,62 57,62 63,65 L 50,88 Z"
          fill="url(#hf-ail)"/>
    <path d="M 36,65 C 43,61 57,61 64,65"
          fill="none" stroke="rgba(255,255,255,0.20)"
          stroke-width="1.2" stroke-linecap="round"/>
    <line x1="12" y1="22" x2="50" y2="52"
          stroke="rgba(255,255,255,0.14)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="88" y1="22" x2="50" y2="52"
          stroke="rgba(255,255,255,0.14)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="52" x2="50" y2="88"
          stroke="rgba(255,255,255,0.09)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="12" cy="22" r="5.2" fill="white" opacity="0.90" filter="url(#hf-glow)"/>
    <circle cx="88" cy="22" r="5.2" fill="white" opacity="0.90" filter="url(#hf-glow)"/>
    <circle cx="50" cy="52" r="3.5" fill="white" opacity="0.62"/>
    <circle cx="50" cy="88" r="9"   fill="url(#hf-apex)"/>
    <circle cx="50" cy="88" r="3.4" fill="white"/>
  </g>

  <!-- Primary wordmark -->
  <text x="92" y="48"
        font-family="'Inter', 'DM Sans', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="800" letter-spacing="-1.2"
        fill="#FFFFFF">aileron</text>

  <!-- Tagline -->
  <text x="94" y="68"
        font-family="'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="500" letter-spacing="2.6"
        fill="#6366F1">EVENT INTELLIGENCE</text>

  <!-- "Open Source" badge -->
  <rect x="93" y="76" width="82" height="13" rx="6"
        fill="none" stroke="#1E1B4B" stroke-width="1"/>
  <text x="134" y="86.5"
        font-family="'Inter', monospace, sans-serif"
        font-size="8" font-weight="500" letter-spacing="0.5"
        text-anchor="middle" fill="#4338CA">Apache 2.0  ·  Open Source</text>
</svg>


<!-- ═══════════════════════════════════════════════════════════════════
     4. VERTICAL STACKED  ·  aileron-vertical.svg
     App store icons, square social cards, compact embeds
     ═══════════════════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 216" width="180" height="216" role="img" aria-label="Aileron">
  <title>Aileron</title>
  <defs>
    <linearGradient id="v-wing" x1="50" y1="22" x2="50" y2="66" gradientUnits="userSpaceOnUse">
