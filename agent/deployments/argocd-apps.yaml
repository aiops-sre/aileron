apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubesense-hub
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aileron-platform/aileron.git
    targetRevision: main
    path: helm/kip-hub
    plugin:
      name: helm-revision-v1.0
      env:
        - name: ENV
          value: example-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: aileron-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubesense-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aileron-platform/aileron.git
    targetRevision: main
    path: helm/kip-agent
    plugin:
      name: helm-revision-v1.0
      env:
        - name: ENV
          value: example-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: aileron-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
