# KubeSense Agent — deployment in aileron-agent namespace (dev cluster: example-cluster-01)
#
# Uses the existing aileron-agent-sa service account which already has
# ClusterRole ai-cluster-readonly (get/list/watch on *.*).
# No new RBAC needed.
#
# Kafka: alerthub-kafka-bootstrap.aileron.svc.cluster.local:9092
#        (cross-namespace access — same cluster)
#
# Apply: kubectl apply -f kubesense-agent-dev.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesense-agent
  namespace: aileron-agent
  labels:
    app.kubernetes.io/name: kubesense-agent
    app.kubernetes.io/version: v0.1.0
    app.kubernetes.io/component: intelligence-agent
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubesense-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubesense-agent
        app.kubernetes.io/version: v0.1.0
    spec:
      serviceAccountName: aileron-agent-sa          # existing SA with cluster read-only access
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532                      # nonroot (distroless default)
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubesense-agent
          image: ghcr.io/aileron-platform/aileron-admins/kubesense-agent:v0.1.0
          imagePullPolicy: Always
          args:
            - --cluster-id=$(CLUSTER_ID)
            - --kafka-brokers=$(KAFKA_BROKERS)
            - --buffer-max=5000
          env:
            - name: CLUSTER_ID
              value: "example-cluster-01"
            - name: KAFKA_BROKERS
              value: "alerthub-kafka-kafka-bootstrap.aileron.svc.cluster.local:9092"
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
      # Run on all nodes — agent watches cluster-wide
      tolerations:
        - operator: Exists
      # Prefer different node than other agents
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kubesense-agent
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: jfrog-dockers-access
