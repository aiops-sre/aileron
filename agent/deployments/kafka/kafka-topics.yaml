# KubeSense Kafka Topics — Strimzi KafkaTopic CRDs
#
# These topics are created on the EXISTING Strimzi-managed Kafka cluster
# used by AlertHub. No new Kafka infrastructure required.
#
# Bootstrap: alerthub-kafka-kafka-bootstrap.aileron.svc.cluster.local:9092
#
# Partitioning strategy:
#   - 6 partitions per topic: supports up to 6 parallel consumers
#   - Message key = cluster_id: events from the same cluster land on the
#     same partition, preserving intra-cluster event ordering
#
# Replication: 3 replicas (matches Strimzi default cluster replication factor)
#
# Apply with: kubectl apply -f kafka-topics.yaml -n aileron
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kubesense.events.topology
  namespace: aileron
  labels:
    strimzi.io/cluster: alerthub-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "604800000"       # 7 days
    retention.bytes: "10737418240"  # 10 GB per partition
    segment.bytes: "1073741824"     # 1 GB segments
    cleanup.policy: "delete"
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kubesense.events.health
  namespace: aileron
  labels:
    strimzi.io/cluster: alerthub-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "604800000"
    retention.bytes: "5368709120"   # 5 GB — health events are smaller
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
