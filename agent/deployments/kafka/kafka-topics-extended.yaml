# KubeSense Extended Kafka Topics — APM, Anomaly, Security, Cost, SLO, Logs
# Apply on the existing Strimzi Kafka cluster alongside kafka-topics.yaml
# kubectl apply -f kafka-topics-extended.yaml -n aileron
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kubesense.apm.golden-signals
  namespace: aileron
  labels:
    strimzi.io/cluster: alerthub-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "259200000"       # 3 days — high volume, short retention
    retention.bytes: "21474836480"  # 20 GB
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kubesense.apm.regressions
  namespace: aileron
  labels:
    strimzi.io/cluster: alerthub-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "604800000"
    retention.bytes: "2147483648"
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kubesense.apm.service-map
  namespace: aileron
  labels:
    strimzi.io/cluster: alerthub-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "86400000"        # 1 day — service map is rebuilt continuously
    cleanup.policy: "compact"       # keep latest service map per key
    min.insync.replicas: "2"
---
