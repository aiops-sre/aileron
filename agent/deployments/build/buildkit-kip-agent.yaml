# KubeSense Agent — Buildkit build job (one-shot)
#
# Builds kubesense-agent from the git repo and pushes to the registry.
# Uses the same Buildkit pattern as alerthub-backend.
#
# Apply: kubectl apply -f buildkit-kubesense-agent.yaml
# Watch: kubectl logs -n buildkit -l job-name=buildkit-kubesense-agent -f
# Check: kubectl get job buildkit-kubesense-agent -n buildkit
---
apiVersion: batch/v1
kind: Job
metadata:
  name: buildkit-kubesense-agent
  namespace: buildkit
  labels:
    app.kubernetes.io/name: kubesense-agent
    app.kubernetes.io/component: build
spec:
  ttlSecondsAfterFinished: 172800    # keep logs for 2 days
  activeDeadlineSeconds: 1800        # 30min timeout
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: buildkit-sa
      imagePullSecrets:
        - name: jfrog-dockers-access
      securityContext:
        sysctls:
          - name: kernel.shm_rmid_forced
            value: "0"
          - name: net.ipv4.ip_unprivileged_port_start
            value: "0"
      hostNetwork: false
      containers:
        - name: buildkit
          image: "moby/buildkit:v0.15.0-rootless"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: Unconfined
            capabilities:
              add: [SYS_ADMIN, SYS_PTRACE, NET_ADMIN, SETFCAP, SETUID, SETGID]
              drop: [ALL]
          command: ["buildctl-daemonless.sh"]
          args:
            - build
            - --frontend=dockerfile.v0
            # Use the KubeSense-specific Dockerfile for the agent
            - --opt=filename=Dockerfile.agent
            # Source: KubeSense repo on interactive-git (main branch)
            - "--opt=context=https://$(GIT_TOKEN)@github.com/aileron-platform/aileron.git#main"
            # Push to the same registry as AlertHub
            - "--output=type=image,name=ghcr.io/aileron-platform/aileron-admins/kubesense-agent:v0.1.0,push=true,registry.insecure=true"
            # Cache using registry (faster rebuilds)
            - "--export-cache=type=registry,ref=ghcr.io/aileron-platform/aileron-admins/kubesense-agent:buildcache,mode=max"
            - "--import-cache=type=registry,ref=ghcr.io/aileron-platform/aileron-admins/kubesense-agent:buildcache"
            # Build args: proxy + Go settings (same as alerthub-backend)
            - "--opt=build-arg:HTTP_PROXY=http://:80"
            - "--opt=build-arg:HTTPS_PROXY=http://:443"
            - "--opt=build-arg:NO_PROXY=*.example.com,ghcr.io/aileron-platform,github.com/aileron-platform"
            - "--opt=build-arg:GOPROXY=https://proxy.golang.org,direct"
            - "--opt=build-arg:GONOSUMDB=*"
            - "--opt=build-arg:VERSION=v0.1.0"
          env:
            - name: HTTP_PROXY
              value: http://:80
            - name: HTTPS_PROXY
              value: http://:443
            - name: NO_PROXY
              value: "*.example.com,ghcr.io/aileron-platform,github.com/aileron-platform"
            - name: DOCKER_CONFIG
              value: /home/user/.docker/
            - name: BUILDKITD_FLAGS
              value: "--oci-worker-no-process-sandbox"
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: interactive-git-token
                  key: token
          volumeMounts:
            - name: docker-config
              mountPath: /home/user/.docker
      restartPolicy: Never
      volumes:
        - name: docker-config
          secret:
            secretName: jfrog-dockers-access
            items:
              - key: .dockerconfigjson
                path: config.json
