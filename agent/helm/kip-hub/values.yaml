# ============================================================
# KubeSense Hub — Default Values
# ============================================================

global:
  imageRegistry: ghcr.io/aileron-platform/aileron-admins
  imagePullSecret: jfrog-dockers-access
  namespace: aileron-agent
  storageClass: example-cluster-netapp-sc

images:
  agent:
    repository: ghcr.io/aileron-platform/aileron-admins/kubesense-agent
    tag: v0.1.0
    pullPolicy: Always
  collector:
    repository: ghcr.io/aileron-platform/aileron-admins/kubesense-collector
    tag: v0.1.0
    pullPolicy: Always
  core:
    repository: ghcr.io/aileron-platform/aileron-admins/kubesense-core
    tag: v0.1.0
    pullPolicy: Always
  api:
    repository: ghcr.io/aileron-platform/aileron-admins/kubesense-api
    tag: v0.1.0
    pullPolicy: Always
  llm:
    repository: ghcr.io/aileron-platform/aileron-admins/kubesense-llm
    tag: v0.1.0
    pullPolicy: Always

# Agent configuration
agent:
  replicas: 1
  # REQUIRED — unique cluster identifier (e.g. "example-cluster", "mps-tooling-mdn")
  clusterID: "example-cluster"
  kafkaBrokers: "alerthub-kafka-kafka-bootstrap.aileron.svc.cluster.local:9092"
  localBufferMax: 5000
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

# Collector configuration
collector:
  replicas: 2
  kafkaBrokers: "alerthub-kafka-kafka-bootstrap.aileron.svc.cluster.local:9092"
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# Core API server — serves REST API + background signal publisher
core:
  replicas: 2
  port: 8080
  kafkaBrokers: "alerthub-kafka-kafka-bootstrap.aileron.svc.cluster.local:9092"
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# API intelligence service — serves REST API + publishes APM/violations/forecasts
# Built from Dockerfile.api (services/core/cmd/api/) — has all intelligence engines
api:
  replicas: 1
  port: 8080
  kafkaBrokers: "alerthub-kafka-kafka-bootstrap.aileron.svc.cluster.local:9092"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# LLM Narrator — consumes incident-context, narrates with Claude API → Ollama → fallback
llm:
  replicas: 1
  ollamaURL: "http://ollama.aileron.svc.cluster.local:11434"
  ollamaModel: "qwen2.5:7b"
  # CLAUDE_API_KEY is sourced from kubesense-llm-secret (optional)
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

# Build configuration — set enabled: true in environment values to trigger Buildkit
build:
  enabled: false

# PostgreSQL — connection sourced from secrets_manager secret at runtime
postgres:
  database: kubesense
  user: kubesense

# Neo4j
neo4j:
  url: "http://kubesense-neo4j.aileron-agent.svc.cluster.local:7474"
  user: neo4j

secrets_manager:
  enabled: true
