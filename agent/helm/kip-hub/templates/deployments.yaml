            - name: NEO4J_URL
              valueFrom:
                secretKeyRef: { name: kubesense-neo4j-secret, key: NEO4J_URL }
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef: { name: kubesense-neo4j-secret, key: NEO4J_PASSWORD }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
{{/* Core Service */}}
apiVersion: v1
kind: Service
metadata:
  name: kubesense-core
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app.kubernetes.io/name: kubesense-core
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
