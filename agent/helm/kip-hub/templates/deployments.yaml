{{/* Agent Deployment */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesense-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kubesense-agent
    app.kubernetes.io/version: {{ .Values.imageTag | default .Values.images.agent.tag | quote }}
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kubesense-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubesense-agent
    spec:
      serviceAccountName: aileron-agent-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.images.agent.repository }}:{{ .Values.imageTag | default .Values.images.agent.tag }}"
          imagePullPolicy: {{ .Values.images.agent.pullPolicy }}
          args:
            - --cluster-id={{ .Values.agent.clusterID }}
            - --kafka-brokers={{ .Values.agent.kafkaBrokers }}
            - --buffer-max={{ .Values.agent.localBufferMax }}
          env:
            - name: CLUSTER_ID
              value: {{ .Values.agent.clusterID | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.agent.kafkaBrokers | quote }}
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet: { path: /healthz, port: 8081 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
{{/* Collector Deployment */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesense-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kubesense-collector
    app.kubernetes.io/version: {{ .Values.imageTag | default .Values.images.collector.tag | quote }}
spec:
  replicas: {{ .Values.collector.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kubesense-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubesense-collector
    spec:
      serviceAccountName: aileron-agent-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      containers:
        - name: collector
          image: "{{ .Values.images.collector.repository }}:{{ .Values.imageTag | default .Values.images.collector.tag }}"
          imagePullPolicy: {{ .Values.images.collector.pullPolicy }}
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.collector.kafkaBrokers | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: kubesense-postgres-secret, key: DATABASE_URL }
            - name: NEO4J_URL
              valueFrom:
                secretKeyRef: { name: kubesense-neo4j-secret, key: NEO4J_URL }
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef: { name: kubesense-neo4j-secret, key: NEO4J_PASSWORD }
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
{{/* Core API Deployment */}}
