{{/* LLM Narrator Deployment — Claude API + Ollama fallback + deterministic */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesense-llm
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kubesense-llm
spec:
  replicas: {{ .Values.llm.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kubesense-llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubesense-llm
        app: kubesense-llm
    spec:
      serviceAccountName: aileron-agent-sa
      securityContext: { runAsNonRoot: true, runAsUser: 65532 }
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      containers:
        - name: llm
          image: "{{ .Values.images.llm.repository }}:{{ .Values.imageTag | default .Values.images.llm.tag }}"
          imagePullPolicy: {{ .Values.images.llm.pullPolicy | default "IfNotPresent" }}
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.collector.kafkaBrokers | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: kubesense-postgres-secret, key: DATABASE_URL }
            - name: OLLAMA_BASE_URL
              value: {{ .Values.llm.ollamaURL | default "http://ollama.aileron.svc.cluster.local:11434" | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.llm.ollamaModel | default "qwen2.5:7b" | quote }}
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubesense-llm-secret
                  key: CLAUDE_API_KEY
                  optional: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
