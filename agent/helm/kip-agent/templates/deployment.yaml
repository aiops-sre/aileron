apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubesense-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubesense-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubesense-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubesense-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --cluster-id=$(CLUSTER_ID)
            - --kafka-brokers=$(KAFKA_BROKERS)
            - --buffer-max={{ .Values.localBufferMax }}
          env:
            - name: CLUSTER_ID
              value: {{ required "clusterID is required" .Values.clusterID | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.kafkaBrokers | quote }}
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
