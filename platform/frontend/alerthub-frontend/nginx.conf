server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers WITHOUT CSP (to allow backend OAuth flows)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # OIDC OAuth2 endpoints — backend handles the full OAuth2 code flow
    # This location is more specific and will be matched before /api/
    location /api/v1/auth/oidc {
        proxy_pass http://alerthub-backend.aileron.svc.cluster.local:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;

        # Remove restrictive CSP from backend auth responses (CRITICAL for OAuth redirects)
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Content-Security-Policy;
        proxy_hide_header X-WebKit-CSP;

        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # PagerDuty / OnCall API proxy — forwards OIDC Bearer token for user auth
    location /pagerduty/ {
        # Rewrite /pagerduty/* to /api/v1/*
        rewrite ^/pagerduty/(.*)$ /api/v1/$1 break;

        proxy_pass https://oncall-pd.k.miao.example.com;
        proxy_http_version 1.1;
        proxy_set_header Host oncall-pd.k.miao.example.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward OIDC Bearer token — frontend sends the access token from OAuth flow
        proxy_set_header Authorization $http_authorization;

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # API proxy to shared backend service
    location /api/ {
        proxy_pass http://alerthub-backend.aileron.svc.cluster.local:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;

        # Forward auth headers (JWT Bearer token from OIDC OAuth2 flow)
        proxy_set_header Authorization $http_authorization;

        # Remove restrictive CSP from backend responses
        proxy_hide_header Content-Security-Policy;

        # LLM queries (ollama text generation) can take 60-120s on CPU
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy - SRE Command Center\n";
        add_header Content-Type text/plain;
    }

    # Never cache index.html — must always be fresh so new asset hashes are loaded
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Cache hashed static assets forever — filenames change on every rebuild
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Main location - SPA routing (must come last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
