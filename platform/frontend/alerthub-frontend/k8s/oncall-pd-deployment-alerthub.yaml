# =============================================================================
# ORPHANED LEGACY — DO NOT APPLY
# =============================================================================
# This Deployment, ConfigMap, and Service are for the oncall-pd application,
# a separate PagerDuty on-call dashboard that targets namespace "sre-hub-alerthub"
# and depends on "sre-hub-config" and "sre-hub-secrets" which do not exist in
# the aileron namespace used by the current Helm chart.
#
# This file belongs to a different application stack and has never been part of
# the AlertHub Enterprise Helm chart. DO NOT apply to the aileron namespace.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oncall-pd
  namespace: sre-hub-alerthub
  labels:
    app.kubernetes.io/instance: sre-hub-alerthub
    app.kubernetes.io/name: oncall-pd
    app.kubernetes.io/version: v1.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: sre-hub-alerthub
      app.kubernetes.io/name: oncall-pd
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: sre-hub-alerthub
        app.kubernetes.io/name: oncall-pd
    spec:
      volumes:
      - name: dashboard-files
        emptyDir: {}
      - name: nginx-config
        configMap:
          name: oncall-pd-nginx-config
          defaultMode: 420
      initContainers:
      - name: copy-dashboard
        image: ghcr.io/aileron-platform/aileron-admins:t1.3.1
        command:
        - sh
        - '-c'
        - cp -r /root/web/* /tmp/dashboard/
        volumeMounts:
        - name: dashboard-files
          mountPath: /tmp/dashboard
        imagePullPolicy: Always
      containers:
      - name: backend
        image: ghcr.io/aileron-platform/aileron-admins:t1.3.1
        ports:
        - name: api
          containerPort: 3000
          protocol: TCP
        env:
        - name: PAGERDUTY_API_URL
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: PAGERDUTY_API_URL
        - name: PAGERDUTY_SCHEDULE_IDS
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: PAGERDUTY_SCHEDULE_IDS
        - name: PAGERDUTY_SERVICE_IDS
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: PAGERDUTY_SERVICE_IDS
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sre-hub-secrets
              key: DB_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: sre-hub-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sre-hub-secrets
              key: REDIS_PASSWORD
        - name: PAGERDUTY_API_KEY
          valueFrom:
            secretKeyRef:
              name: sre-hub-secrets
              key: PAGERDUTY_API_KEY
        - name: API_PREFIX
          value: "/api/v1"
        - name: CACHE_TTL
          value: "300"
        - name: ONCALL_CACHE_TTL
          value: "60"
        - name: CORS_ORIGIN
          value: "*"
        - name: HTTP_PROXY
          value: http://:80
        - name: HTTPS_PROXY
          value: http://:443
        - name: http_proxy
          value: http://:80
        - name: https_proxy
          value: http://:443
        - name: NO_PROXY
          value: localhost,127.0.0.1,.cluster.local,.svc,10.0.0.0/8
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: dashboard-files
          mountPath: /tmp/dashboard
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: api
            scheme: HTTP
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: api
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 3
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        imagePullPolicy: Always
      - name: nginx
        image: nginx:alpine
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: dashboard-files
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: jfrog-dockers-access
      schedulerName: default-scheduler
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oncall-pd-nginx-config
  namespace: sre-hub-alerthub
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        
        # Root directory
        root /usr/share/nginx/html;
        index index.html;
        
        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        
        # Health check
        location /health {
            proxy_pass http://localhost:3000/api/v1/health;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: oncall-pd-service
  namespace: sre-hub-alerthub
  labels:
    app.kubernetes.io/instance: sre-hub-alerthub
    app.kubernetes.io/name: oncall-pd
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/instance: sre-hub-alerthub
    app.kubernetes.io/name: oncall-pd
