{{- if .Values.externalSecrets.enabled }}
---
# ExternalSecrets Operator — sync secrets from Vault/AWS SM/GCP SM/Azure KV
# Requires: https://external-secrets.io installed in the cluster
# Install: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace

{{- if .Values.externalSecrets.vaultAddr }}
---
# HashiCorp Vault SecretStore
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aileron-vault
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.vaultAddr }}
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: aileron
          serviceAccountRef:
            name: aileron-backend
{{- end }}

{{- if .Values.externalSecrets.awsRegion }}
---
# AWS Secrets Manager SecretStore
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aileron-aws-sm
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.awsRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: aileron-backend
{{- end }}

{{- if .Values.externalSecrets.gcpProjectId }}
---
# GCP Secret Manager SecretStore
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aileron-gcp-sm
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcpProjectId }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.externalSecrets.gcpClusterLocation | default "us-central1" }}
          clusterName: {{ .Values.externalSecrets.gcpClusterName | default "aileron-cluster" }}
          serviceAccountRef:
            name: aileron-backend
{{- end }}

{{- if .Values.externalSecrets.azureVaultUrl }}
---
# Azure Key Vault SecretStore
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aileron-azure-kv
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    azurekv:
      vaultUrl: {{ .Values.externalSecrets.azureVaultUrl }}
      authType: WorkloadIdentity
      serviceAccountRef:
        name: aileron-backend
{{- end }}

---
# ExternalSecret — syncs all Aileron secrets from the configured store
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aileron-app-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: aileron
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore | default "aileron-vault" }}
    kind: SecretStore
  target:
    name: aileron-app-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "{{ `{{ .database_url }}` }}"
        JWT_SECRET: "{{ `{{ .jwt_secret }}` }}"
        JWT_REFRESH_SECRET: "{{ `{{ .jwt_refresh_secret }}` }}"
        OIDC_CLIENT_SECRET: "{{ `{{ .oidc_client_secret }}` }}"
        REDIS_URL: "{{ `{{ .redis_url }}` }}"
        NEO4J_PASSWORD: "{{ `{{ .neo4j_password }}` }}"
        INTERNAL_SERVICE_TOKEN: "{{ `{{ .internal_service_token }}` }}"
  data:
  - secretKey: database_url
    remoteRef:
      key: {{ .Values.externalSecrets.dbPasswordKey | default "aileron/database-url" }}
  - secretKey: jwt_secret
    remoteRef:
      key: {{ .Values.externalSecrets.jwtSecretKey | default "aileron/jwt-secret" }}
  - secretKey: jwt_refresh_secret
    remoteRef:
      key: {{ .Values.externalSecrets.jwtRefreshKey | default "aileron/jwt-refresh-secret" }}
  - secretKey: oidc_client_secret
    remoteRef:
      key: {{ .Values.externalSecrets.oidcSecretKey | default "aileron/oidc-client-secret" }}
  - secretKey: redis_url
    remoteRef:
      key: {{ .Values.externalSecrets.redisKey | default "aileron/redis-url" }}
  - secretKey: neo4j_password
    remoteRef:
      key: {{ .Values.externalSecrets.neo4jKey | default "aileron/neo4j-password" }}
  - secretKey: internal_service_token
    remoteRef:
      key: {{ .Values.externalSecrets.internalTokenKey | default "aileron/internal-service-token" }}
{{- end }}

{{- if .Values.certManager.enabled }}
---
# cert-manager Certificate — auto-provision and rotate TLS certificate
# Requires: cert-manager installed in the cluster
# Install: helm install cert-manager jetstack/cert-manager -n cert-manager --set installCRDs=true
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aileron-tls
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: aileron
spec:
  secretName: aileron-tls
  issuerRef:
    name: {{ .Values.certManager.clusterIssuer | default "letsencrypt-prod" }}
    kind: ClusterIssuer
  commonName: {{ .Values.ingress.host | default "aileron.example.com" }}
  dnsNames:
  - {{ .Values.ingress.host | default "aileron.example.com" }}
  {{- if .Values.dex.enabled }}
  - {{ .Values.dex.ingress.host | default "dex.aileron.example.com" }}
  {{- end }}
  duration: 2160h   # 90 days
  renewBefore: 360h # 15 days before expiry
---
# ClusterIssuer — Let's Encrypt via HTTP-01 challenge
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer | default "letsencrypt-prod" }}
  labels:
    app.kubernetes.io/part-of: aileron
spec:
  acme:
    email: {{ .Values.certManager.email | default "admin@example.com" }}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className | default "nginx" }}
{{- end }}
