apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
    app: redis-cluster
spec:
  serviceName: redis-hl
  replicas: {{ .Values.redis.replicas }}
  selector:
    matchLabels:
      app: redis-cluster
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  template:
    metadata:
      labels:
        app: redis-cluster
        {{- include "alerthub.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cache
    spec:
      {{- include "alerthub.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
      initContainers:
        {{- if .Values.secrets_manager.enabled }}
        - name: init-secrets_managerctl
          image: ghcr.io/aileron-platform/crypto-services/secrets_managerctl:1.1.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              ./secrets_managerctl secret fetch \
                --server  \
                --client-certificate /etc/ssl/secrets_manager/tls.crt \
                --client-key /etc/ssl/secrets_manager/tls.key \
                --client-certificate-format PEM \
                --namespace aileron-admins \
                --secret-name alerthub-app-secrets \
                --output-dir /tmp/secrets
          volumeMounts:
            - name: secrets_manager-secrets
              mountPath: /tmp/secrets
            - name: secrets_manager-cert
              mountPath: /etc/ssl/secrets_manager
              readOnly: true
        {{- else }}
        - name: init-k8s-secrets
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              printf '{}' > /tmp/secrets/alerthub-app-secrets
          volumeMounts:
            - name: secrets_manager-secrets
              mountPath: /tmp/secrets
        {{- end }}
        - name: redis-init
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              ORDINAL="${HOSTNAME##*-}"
              CONFIG_DIR=/data/redis-config
              mkdir -p "$CONFIG_DIR"
              cp /etc/redis-config/redis.conf "$CONFIG_DIR/redis.conf"
              if [ "$ORDINAL" != "0" ]; then
                echo "replicaof redis-cluster-0.redis-hl 6379" >> "$CONFIG_DIR/redis.conf"
              fi
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis-config
              readOnly: true
            - name: redis-data
              mountPath: /data
      containers:
        - name: redis
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              awk -F'"' '{for(i=2;i<NF;i+=4) if($i~/^[A-Z_][A-Z0-9_]*$/ && $(i+2)!="") print "export "$i"="$(i+2)}' \
                /tmp/secrets/alerthub-app-secrets > /tmp/secrets/env.sh
              . /tmp/secrets/env.sh
              exec redis-server /data/redis-config/redis.conf
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis-config
              readOnly: true
            - name: secrets_manager-secrets
              mountPath: /tmp/secrets
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
        - name: secrets_manager-secrets
          emptyDir: {}
        {{- if .Values.secrets_manager.enabled }}
        - name: secrets_manager-cert
          csi:
            driver: cmcs.crypto-services.example.com
            readOnly: true
            volumeAttributes:
              cmcs.crypto-services.example.com/duration: "24h"
              cmcs.crypto-services.example.com/fs-group: "1000"
              cmcs.crypto-services.example.com/issuer-kind: AppleCertificateManagerCorpCA
              cmcs.crypto-services.example.com/issuer-name: applecm-secrets_manager-corpca-7915896-7915893
              cmcs.crypto-services.example.com/key-usages: "client auth,digital signature,key encipherment"
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app: redis-cluster
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
