{{- if .Values.kubesense.enabled }}
# KubeSense Strimzi KafkaTopic CRDs
# Creates all kubesense.* topics on the shared Strimzi Kafka cluster.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kubesense.events.topology
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: alerthub-kafka
    {{- include "alerthub.labels" . | nindent 4 }}
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "604800000"
    retention.bytes: "10737418240"
    segment.bytes: "1073741824"
    cleanup.policy: "delete"
    min.insync.replicas: "2"
---
