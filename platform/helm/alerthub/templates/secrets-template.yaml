# ============================================================
# AlertHub Secret Templates — DO NOT COMMIT REAL VALUES
# ============================================================
# This file is intentionally commented out. Copy the relevant
# block, fill in the real values, and apply with:
#
#   kubectl apply -f <your-secrets-file>.yaml -n aileron
#
# NEVER commit files containing real credentials to git.
# Use sealed-secrets, Vault, or an external secret operator
# to manage these in production.
# ============================================================

# ---------------------------------------------------------------------------
# 1. alerthub-secrets
#    Contains: DB password, JWT keys, Redis auth, Neo4j auth, NetApp password,
#              Weaviate API key, internal service token, and kubeconfig files.
# ---------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: alerthub-secrets
#   namespace: aileron
# type: Opaque
# stringData:
#   # ---- database ----
#   DB_PASSWORD: "REPLACE_WITH_POSTGRES_PASSWORD"
#
#   # ---- JWT ----
#   jwt-secret: "REPLACE_WITH_MIN_32_CHAR_RANDOM_STRING"
#   jwt-refresh-secret: "REPLACE_WITH_DIFFERENT_MIN_32_CHAR_RANDOM_STRING"
#
#   # ---- Redis ----
#   redis-password: "REPLACE_WITH_REDIS_AUTH_PASSWORD"
#
#   # ---- Neo4j ----
#   neo4j-auth: "REPLACE_WITH_NEO4J_PASSWORD"
#
#   # ---- NetApp ONTAP ----
#   netapp-password: "REPLACE_WITH_NETAPP_HARVEST_USER_PASSWORD"
#
#   # ---- Weaviate ----
#   weaviate-api-key: "REPLACE_WITH_WEAVIATE_API_KEY_OR_ANY_RANDOM_STRING"
#
#   # ---- Internal service-to-service token ----
#   INTERNAL_SERVICE_TOKEN: "REPLACE_WITH_INTERNAL_SERVICE_TOKEN"
#
#   # ---- Kubeconfig files (base64-encoded or raw YAML) ----
#   # Provide one key per cluster. Each value is the full kubeconfig YAML.
#   mps-build-rno.yaml: |
#     # paste kubeconfig content here
#   example-cluster-oidc.yaml: |
#     # paste kubeconfig content here
#   example-cluster.yaml: |
#     # paste kubeconfig content here
#   mps-mondev-mdn.yaml: |
#     # paste kubeconfig content here
#   mps-monprod-mdn.yaml: |
#     # paste kubeconfig content here
#   mps-nonprod-rno.yaml: |
#     # paste kubeconfig content here
#   mps-preview-rno.yaml: |
#     # paste kubeconfig content here
#   mps-prod-rno.yaml: |
#     # paste kubeconfig content here
#   mps-sandbox-mdn.yaml: |
#     # paste kubeconfig content here
#   mps-sandbox-rno.yaml: |
#     # paste kubeconfig content here
#   mps-tooling-dev-mdn.yaml: |
#     # paste kubeconfig content here
#   mps-tooling-mdn.yaml: |
#     # paste kubeconfig content here

# ---------------------------------------------------------------------------
# 2. alerthub-ldap-credentials
#    Aileron LDAP / OIDC bind credentials for group lookup.
# ---------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: alerthub-ldap-credentials
#   namespace: aileron
# type: Opaque
# stringData:
#   LDAP_APP_ID: "REPLACE_WITH_OIDC_APP_ID"
#   LDAP_APP_PASSWORD: "REPLACE_WITH_OIDC_APP_PASSWORD"

# ---------------------------------------------------------------------------
# 3. alerthub-hcl-credentials
#    OIDC HCL / IncidentManager OAuth client credentials.
# ---------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: alerthub-hcl-credentials
#   namespace: aileron
# type: Opaque
# stringData:
#   OIDC_APP_ID: "REPLACE_WITH_HCL_APP_ID"
#   OIDC_APP_PASSWORD: "REPLACE_WITH_HCL_APP_PASSWORD"

# ---------------------------------------------------------------------------
# 4. neo4j-credentials
#    Duplicates neo4j-auth from alerthub-secrets; kept separate for
#    secret-rotation and least-privilege access by rca-orchestrator.
# ---------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: neo4j-credentials
#   namespace: aileron
# type: Opaque
# stringData:
#   NEO4J_AUTH: "REPLACE_WITH_NEO4J_PASSWORD"

# ---------------------------------------------------------------------------
# 5. infrastructure-credentials
#    External infrastructure API credentials used by rca-orchestrator.
# ---------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: infrastructure-credentials
#   namespace: aileron
# type: Opaque
# stringData:
#   dynatrace-api-token: "REPLACE_WITH_DYNATRACE_API_TOKEN"
#   cloudstack-api-key: "REPLACE_WITH_CLOUDSTACK_API_KEY"
#   cloudstack-secret-key: "REPLACE_WITH_CLOUDSTACK_SECRET_KEY"

# ---------------------------------------------------------------------------
# 6. endor-credentials  (optional — internal LLM gateway)
#    Only required if using Endor instead of / in addition to local Ollama.
# ---------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: endor-credentials
#   namespace: aileron
# type: Opaque
# stringData:
#   client-id: "REPLACE_WITH_ENDOR_CLIENT_ID"
#   client-secret: "REPLACE_WITH_ENDOR_CLIENT_SECRET"
#   totp-secret: "REPLACE_WITH_ENDOR_TOTP_SECRET"
#   app-id-key: "REPLACE_WITH_ENDOR_APP_ID_KEY"
#   oidc-app-id: "REPLACE_WITH_ENDOR_OIDC_APP_ID"
#   account-name: "REPLACE_WITH_ENDOR_ACCOUNT_NAME"
#   account-password: "REPLACE_WITH_ENDOR_ACCOUNT_PASSWORD"

# ---------------------------------------------------------------------------
# 7. alerthub-secrets_manager-cert
#    Internal TLS certificate for SecretsManager (internal mTLS).
#    Optional — backend will skip SecretsManager if cert is absent.
# ---------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: alerthub-secrets_manager-cert
#   namespace: aileron
# type: kubernetes.io/tls
# data:
#   tls.crt: <base64-encoded PEM certificate>
#   tls.key: <base64-encoded PEM private key>
