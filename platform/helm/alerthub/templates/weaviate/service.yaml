apiVersion: v1
kind: Service
metadata:
  name: weaviate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: vector-db
    app: weaviate
spec:
  type: ClusterIP
  selector:
    app: weaviate
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
