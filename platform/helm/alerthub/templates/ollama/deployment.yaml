apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-inference
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        {{- include "alerthub.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm-inference
    spec:
      {{- include "alerthub.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: ollama
          image: "{{ .Values.images.ollama.repository }}:{{ .Values.imageTag | default .Values.images.ollama.tag }}"
          imagePullPolicy: {{ .Values.images.ollama.pullPolicy }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: /ollama-models
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "2"
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: ollama-data
              mountPath: /ollama-models
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
      # Prefer nodes with large CPU/memory allocatable to avoid scheduling failures.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - example-cluster-worker-z1-06
                      - example-cluster-worker-z1-07
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-inference
    app: ollama
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ollama.storage }}
