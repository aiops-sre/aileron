apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
    app: postgres-primary
spec:
  type: ClusterIP
  selector:
    app: postgres-primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
