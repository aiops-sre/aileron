apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
data:
  redis.conf: |
    # -----------------------------------------------------------------------
    # AlertHub Redis configuration
    # -----------------------------------------------------------------------

    # Networking
    bind 0.0.0.0
    protected-mode no
    port 6379
    tcp-backlog 511
    timeout 300
    tcp-keepalive 60

    # Memory management
    maxmemory {{ .Values.redis.maxmemory }}
    maxmemory-policy allkeys-lru
    maxmemory-samples 10

    # Persistence — AOF for durability
    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    # RDB snapshot (fallback)
    save 3600 1
    save 300 100
    save 60 10000

    # Slow log
    slowlog-log-slower-than 10000
    slowlog-max-len 128

    # Cluster
    cluster-enabled no

    # Logging
    loglevel notice
    logfile ""

    # Databases
    databases 16

    # Eviction / LFU
    lfu-log-factor 10
    lfu-decay-time 1

    # Latency monitoring
    latency-monitor-threshold 100
