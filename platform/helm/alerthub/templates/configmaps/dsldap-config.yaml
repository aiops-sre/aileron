apiVersion: v1
kind: ConfigMap
metadata:
  name: alerthub-ldap-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
data:
  LDAP_ENABLED: {{ .Values.ldap.enabled | quote }}
  LDAP_SERVER_URL: {{ .Values.ldap.serverUrl | quote }}
  LDAP_USER_SEARCH_BASE: {{ .Values.ldap.userSearchBase | quote }}
  # How long to cache LDAP group memberships (Aileron LDAP syncs AD in 3-10 min)
  LDAP_CACHE_TTL_MINUTES: {{ .Values.ldap.cacheTtlMinutes | quote }}
  # AD group CNs that map to each AlertHub role (comma-separated)
  OIDC_ADMIN_GROUPS: {{ .Values.ldap.adminGroups | quote }}
  OIDC_OPERATOR_GROUPS: {{ .Values.ldap.operatorGroups | quote }}
  OIDC_VIEWER_GROUPS: {{ .Values.ldap.viewerGroups | quote }}
