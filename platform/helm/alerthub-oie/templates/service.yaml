apiVersion: v1
kind: Service
metadata:
  name: oie
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oie.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: oie
    {{- include "oie.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: 9091
      protocol: TCP
