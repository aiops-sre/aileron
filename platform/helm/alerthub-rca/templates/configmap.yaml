apiVersion: v1
kind: ConfigMap
metadata:
  name: rca-orchestrator-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: rca-orchestrator
data:
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_MODEL: {{ .Values.rca.ollamaModel | quote }}
  OLLAMA_TIMEOUT: {{ .Values.rca.ollamaTimeout | quote }}
  EMBED_MODEL: {{ .Values.rca.embedModel | quote }}
  # BERT service fallback for embeddings when Ollama is unavailable
  BERT_URL: "http://alerthub-bert-service:8765"

  WEAVIATE_URL: "http://weaviate:8080"
  NEO4J_URL: "bolt://neo4j:7687"

  KAFKA_BROKERS: {{ .Values.backend.kafkaBrokers | quote }}
  KAFKA_TOPIC_ALERTS: "raw-alerts"

  BACKEND_URL: "http://alerthub-backend:{{ .Values.backend.port }}"

  DYNATRACE_URL: {{ .Values.rca.dynatraceUrl | quote }}
  CLOUDSTACK_RNO_URL: {{ .Values.rca.cloudstackRnoUrl | quote }}
  CLOUDSTACK_MDN_URL: {{ .Values.rca.cloudstackMdnUrl | quote }}

  DEFAULT_CLUSTER: {{ .Values.rca.defaultCluster | quote }}
  MAX_TOOL_ROUNDS: {{ .Values.rca.maxToolRounds | quote }}
  INVESTIGATION_TIMEOUT: {{ .Values.rca.investigationTimeout | quote }}

  KUBECONFIG_DIR: "/etc/kubeconfigs"

  INTERNAL_TLS_INSECURE: {{ .Values.config.internalTlsInsecure | quote }}
