apiVersion: v1
kind: Service
metadata:
  name: alerthub-bert-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: bert-embeddings
    app: alerthub-bert-service
spec:
  type: ClusterIP
  selector:
    app: alerthub-bert-service
  ports:
    - name: http
      port: 8765
      targetPort: 8765
      protocol: TCP
