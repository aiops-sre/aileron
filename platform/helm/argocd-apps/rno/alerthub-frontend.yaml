apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerthub-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aileron-platform/aileron.git
    targetRevision: master
    path: helm/alerthub-frontend
    plugin:
      name: helm-revision-v1.0
      env:
        - name: ENV
          value: example-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: aileron
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
