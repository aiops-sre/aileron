apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerthub-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/aileron-platform/aileron.git
    targetRevision: master
    path: helm/argocd-apps/rno
    directory:
      recurse: false
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
