apiVersion: v1
kind: Service
metadata:
  name: alerthub-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alerthub.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    app: alerthub-backend
spec:
  type: ClusterIP
  selector:
    app: alerthub-backend
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
