# Note: Using existing alerthub-secrets instead of creating new ones
---
# Ingress for AlertHub Enterprise (internal)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alerthub-enterprise-ingress
  namespace: aileron
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  tls:
  - hosts:
    - alerthub-enterprise.example-cluster.k8s.example.com
    secretName: alerthub-tls-secret
  rules:
  - host: alerthub-enterprise.example-cluster.k8s.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: alerthub-enterprise-main
            port:
              number: 3000
---
# NetworkPolicy: restrict traffic to/from alerthub pods
# Allows ingress from same namespace + ingress-nginx
# Allows egress to internal k8s services + internal/external services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alerthub-network-policy
  namespace: aileron
spec:
  podSelector:
    matchLabels:
      app: alerthub-enterprise
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from any pod within the same namespace (DB, Redis, Weaviate, etc.)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aileron
  # Allow traffic from the ingress-nginx controller
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  egress:
  # Allow DNS resolution (UDP+TCP port 53) to any destination
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow all traffic to pods within the same namespace
  # (PostgreSQL:5432, Redis:6379, Weaviate:8080, Neo4j:7687/7474, Kafka:9092)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aileron
  # Allow HTTPS (443) outbound to all IPs — covers internal corporate services:
  # -  (OIDC Provider/Claude GenAI — 17.x.x.x)
  # - hclapi.example.com (IncidentManager incident management — 17.x.x.x)
  # - directory.example.com (OIDC CSS photo/user lookup — corp network)
  # - , oidcac-uat.example.com (OIDC OAuth2 — corp network)
  # - oncall-pd.k.example.com (PagerDuty OnCall API — corp network)
  # Internal services may span private IP ranges;
  # we allow all destinations on 443 since IPs are not fixed or publicly documented.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
  # Allow LDAP/LDAPS to  (Aileron LDAP group lookup)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 636
    - protocol: TCP
      port: 389
