name: AlertHub Enterprise Microservices CI/CD Pipeline

on:
  push:
    branches: [master, develop, feature/*]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      deployment_type:
        description: 'Deployment type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - microservices-only
          - migration
      dry_run:
        description: 'Perform dry run'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      microservices: ${{ steps.changes.outputs.microservices }}
      infrastructure: ${{ steps.changes.outputs.infrastructure }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect changes
      uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          backend:
            - 'internal/**'
            - 'cmd/**'
            - 'go.mod'
            - 'go.sum'
            - 'Dockerfile.backend'
          frontend:
            - 'sre-command-center/**'
            - 'frontend-2.0/**'
          microservices:
            - 'microservices/**'
            - 'proto/**'
          infrastructure:
            - 'k8s/**'
            - 'terraform/**'
            - 'infrastructure/**'
            - 'charts/**'
          docs:
            - 'docs/**'
            - '*.md'

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: go, javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Run Semgrep Security Scan
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets
          p/dockerfile
          p/kubernetes
        generateSarif: "1"

    - name: Upload Semgrep results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: semgrep.sarif

  # ============================================================================
  # BACKEND CI
  # ============================================================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run go mod verify
      run: go mod verify

    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Run golangci-lint
      run: golangci-lint run --timeout=10m --config=.golangci.yml

    - name: Run gosec security scanner
      uses: securecodewarrior/github-action-gosec@master
      with:
        args: '-fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: gosec-results.sarif

    - name: Run unit tests
      run: |
        go test -race -coverprofile=coverage.out -covermode=atomic ./...
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload test coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: backend
        name: backend-coverage

    - name: Build backend
      run: |
        CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o alerthub ./cmd/enterprise
        
    - name: Upload backend artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-binary
        path: alerthub
        retention-days: 7

  # ============================================================================
  # MICROSERVICES CI
  # ============================================================================
  microservices-ci:
    name: Microservices CI
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.microservices == 'true' || github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        service:
          - auth-service
          - alert-management
          - config-management
          - topology-knowledge
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Test microservice
      working-directory: ./microservices/${{ matrix.service }}
      run: |
        go mod download
        go test -v -race -coverprofile=coverage.out ./...

    - name: Build microservice
      working-directory: ./microservices/${{ matrix.service }}
      run: |
        CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o ${{ matrix.service }} ./cmd

    - name: Upload microservice artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.service }}-binary
        path: ./microservices/${{ matrix.service }}/${{ matrix.service }}
        retention-days: 7

  # ============================================================================
  # FRONTEND CI
  # ============================================================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        app:
          - sre-command-center
          - frontend-2.0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ./${{ matrix.app }}/package-lock.json

    - name: Install dependencies
      working-directory: ./${{ matrix.app }}
      run: npm ci

    - name: Run ESLint
      working-directory: ./${{ matrix.app }}
      run: npm run lint

    - name: Run TypeScript check
      working-directory: ./${{ matrix.app }}
      run: npx tsc --noEmit

    - name: Run unit tests
      working-directory: ./${{ matrix.app }}
      run: npm test -- --coverage --watchAll=false

    - name: Upload test coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./${{ matrix.app }}/coverage/lcov.info
        flags: ${{ matrix.app }}
        name: ${{ matrix.app }}-coverage

    - name: Build frontend
      working-directory: ./${{ matrix.app }}
      run: npm run build

    - name: Upload frontend artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.app }}-dist
        path: ./${{ matrix.app }}/dist
        retention-days: 7

  # ============================================================================
  # INFRASTRUCTURE VALIDATION
  # ============================================================================
  infrastructure-validation:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.infrastructure == 'true' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0

    - name: Terraform Format Check
      working-directory: ./terraform
      run: terraform fmt -check

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Plan
      working-directory: ./terraform
      run: terraform plan -no-color
      env:
        TF_VAR_environment: staging

    - name: Validate Kubernetes manifests
      run: |
        # Install kubeval
        wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo mv kubeval /usr/local/bin/
        
        # Validate all K8s manifests
        find k8s/ -name "*.yaml" -o -name "*.yml" | xargs kubeval

    - name: Validate Helm charts
      run: |
        # Install Helm
        curl https://get.helm.sh/helm-v3.13.0-linux-amd64.tar.gz | tar xz
        sudo mv linux-amd64/helm /usr/local/bin/
        
        # Lint all Helm charts
        find charts/ -name "Chart.yaml" -execdir helm lint . \;

  # ============================================================================
  # INTEGRATION TESTING
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-ci, microservices-ci]
    if: always() && (needs.backend-ci.result == 'success' || needs.microservices-ci.result == 'success')
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: alerthub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run database migrations
      run: |
        go run cmd/enterprise/main.go migrate --database-url="postgres://postgres:test@localhost:5432/alerthub_test?sslmode=disable"

    - name: Run integration tests
      run: |
        go test -v -tags=integration ./tests/integration/...
      env:
        DATABASE_URL: postgres://postgres:test@localhost:5432/alerthub_test?sslmode=disable
        REDIS_URL: redis://localhost:6379

    - name: Run API tests
      run: |
        # Start the application in background
        go run cmd/enterprise/main.go server &
        sleep 10
        
        # Run API tests using Newman (Postman CLI)
        npx newman run tests/postman/alerthub-api-tests.json \
          --environment tests/postman/test-environment.json \
          --reporters cli,junit \
          --reporter-junit-export api-test-results.xml

    - name: Upload API test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-results
        path: api-test-results.xml

  # ============================================================================
  # PERFORMANCE TESTING
  # ============================================================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run load tests
      run: |
        k6 run tests/performance/load-test.js \
          --duration=5m \
          --vus=50 \
          --out json=performance-results.json

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: performance-results.json

  # ============================================================================
  # DOCKER BUILD & PUSH
  # ============================================================================
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, microservices-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        component:
          - name: backend
            context: .
            dockerfile: Dockerfile.backend
            platforms: linux/amd64,linux/arm64
          - name: auth-service
            context: ./microservices/auth-service
            dockerfile: docker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: alert-management
            context: ./microservices/alert-management
            dockerfile: docker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: config-management
            context: ./microservices/config-management
            dockerfile: docker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: topology-knowledge
            context: ./microservices/topology-knowledge
            dockerfile: docker/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: sre-command-center
            context: ./sre-command-center
            dockerfile: Dockerfile
            platforms: linux/amd64,linux/arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.component.context }}
        file: ${{ matrix.component.context }}/${{ matrix.component.dockerfile }}
        platforms: ${{ matrix.component.platforms }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component.name }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component.name }}:buildcache,mode=max

    - name: Sign container images
      uses: sigstore/cosign-installer@v3
    
    - name: Sign the published Docker image
      env:
        COSIGN_EXPERIMENTAL: 1
      run: |
        cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.component.name }}@${{ steps.meta.outputs.digest }}

  # ============================================================================
  # DEPLOYMENT TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build-push, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://alerthub-staging.yourdomain.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Setup Helm
      uses: azure/setup-helm@v3

    - name: Configure kubectl
      run: |
        echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=./kubeconfig

    - name: Deploy to staging
      run: |
        export KUBECONFIG=./kubeconfig
        chmod +x scripts/deploy/master-deployment.sh
        ./scripts/deploy/master-deployment.sh \
          --environment staging \
          --namespace alerthub-staging \
          --type full

    - name: Run smoke tests
      run: |
        export KUBECONFIG=./kubeconfig
        chmod +x scripts/deploy/validation/smoke-tests.sh
        ./scripts/deploy/validation/smoke-tests.sh alerthub-staging staging

  # ============================================================================
  # DEPLOYMENT TO PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://alerthub.yourdomain.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Setup Helm
      uses: azure/setup-helm@v3

    - name: Configure kubectl
      run: |
        echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=./kubeconfig

    - name: Pre-deployment validation
      run: |
        export KUBECONFIG=./kubeconfig
        chmod +x scripts/deploy/validation/pre-deployment-checks.sh
        ./scripts/deploy/validation/pre-deployment-checks.sh alerthub production

    - name: Deploy to production
      run: |
        export KUBECONFIG=./kubeconfig
        chmod +x scripts/deploy/master-deployment.sh
        ./scripts/deploy/master-deployment.sh \
          --environment production \
          --namespace alerthub \
          --type ${{ github.event.inputs.deployment_type || 'full' }} \
          ${{ github.event.inputs.dry_run && '--dry-run' || '' }}

    - name: Post-deployment validation
      run: |
        export KUBECONFIG=./kubeconfig
        chmod +x scripts/deploy/validation/post-deployment-validation.sh
        ./scripts/deploy/validation/post-deployment-validation.sh alerthub production

    - name: Generate deployment report
      run: |
        export KUBECONFIG=./kubeconfig
        chmod +x scripts/deploy/validation/generate-deployment-report.sh
        ./scripts/deploy/validation/generate-deployment-report.sh alerthub production

    - name: Upload deployment report
      uses: actions/upload-artifact@v4
      with:
        name: production-deployment-report
        path: deployment-report.html

  # ============================================================================
  # MIGRATION WORKFLOW
  # ============================================================================
  migrate-to-microservices:
    name: Migrate to Microservices
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_type == 'migration'
    environment:
      name: ${{ github.event.inputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=./kubeconfig

    - name: Run migration
      run: |
        export KUBECONFIG=./kubeconfig
        chmod +x scripts/deploy/migration/migrate-to-microservices.sh
        ./scripts/deploy/migration/migrate-to-microservices.sh \
          --environment ${{ github.event.inputs.environment }} \
          --namespace alerthub \
          --mode canary \
          ${{ github.event.inputs.dry_run && '--dry-run' || '' }}

  # ============================================================================
  # NOTIFICATION
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging, migrate-to-microservices]
    if: always() && (needs.deploy-production.result != 'skipped' || needs.deploy-staging.result != 'skipped' || needs.migrate-to-microservices.result != 'skipped')
    
    steps:
    - name: Determine status
      id: status
      run: |
        if [[ "${{ needs.deploy-production.result }}" == "success" || "${{ needs.deploy-staging.result }}" == "success" || "${{ needs.migrate-to-microservices.result }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
        fi

    - name: Slack Notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ steps.status.outputs.status }}
        text: |
          AlertHub Enterprise Deployment ${{ steps.status.outputs.status }}
          Environment: ${{ github.event.inputs.environment || 'auto' }}
          Commit: ${{ github.sha }}
          Actor: ${{ github.actor }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()

    - name: Teams Notification
      uses: skitionek/notify-microsoft-teams@master
      if: always()
      with:
        webhook_url: ${{ secrets.TEAMS_WEBHOOK }}
        needs: ${{ toJson(needs) }}
        job: ${{ toJson(job) }}

    - name: Email Notification
      uses: dawidd6/action-send-mail@v3
      if: failure()
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: 587
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: AlertHub Enterprise Deployment Failed
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: AlertHub CI/CD <noreply@alerthub.com>
        body: |
          AlertHub Enterprise deployment has failed.
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Actor: ${{ github.actor }}
          
          Please check the GitHub Actions logs for more details.

  # ============================================================================
  # CLEANUP
  # ============================================================================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [notify]
    if: always()
    
    steps:
    - name: Cleanup artifacts
      run: |
        echo "Performing cleanup tasks..."
        # Add any cleanup logic here

    - name: Update deployment status
      run: |
        echo "Deployment workflow completed"