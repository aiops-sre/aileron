name: Secret Scanning

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  gitleaks:
    name: Detect secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-hardcoded-secrets:
    name: Detect hardcoded patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          FAILED=0

          # Patterns to reject in committed code
          declare -A PATTERNS=(
            ["AWS key"]='AKIA[0-9A-Z]{16}'
            ["Private key header"]='-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'
            ["Generic password assignment"]='password\s*=\s*["'"'"'][^$\{][^"'"'"']{6,}'
            ["JWT secret assignment"]='jwt_secret\s*=\s*["'"'"'][^"'"'"']{10,}'
            ["Bearer token hardcoded"]='Authorization.*Bearer [a-zA-Z0-9_\-\.]{20,}'
          )

          # Files/paths to skip
          SKIP_PATTERN='(\.env\.example|_test\.go|mock_|testdata|\.md|scripts/mock|scripts/sim)'

          for label in "${!PATTERNS[@]}"; do
            pattern="${PATTERNS[$label]}"
            hits=$(grep -rniP "$pattern" . \
              --include="*.go" --include="*.ts" --include="*.tsx" --include="*.sh" --include="*.yaml" --include="*.yml" \
              | grep -vP "$SKIP_PATTERN" | grep -v '^Binary' || true)
            if [ -n "$hits" ]; then
              echo "FAIL [$label]:"
              echo "$hits"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "Hardcoded secrets detected. Use environment variables or K8s secrets instead."
            exit 1
          fi

          echo "No hardcoded secret patterns found."

  large-file-check:
    name: Block large binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for large files (>10MB)
        run: |
          FAILED=0
          while IFS= read -r file; do
            size=$(du -k "$file" | cut -f1)
            if [ "$size" -gt 10240 ]; then
              echo "FAIL: $file is ${size}KB (limit 10MB)"
              FAILED=1
            fi
          done < <(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null | head -100)

          if [ $FAILED -ne 0 ]; then
            echo "Large binaries must not be committed. Use an artifact store or build pipeline instead."
            exit 1
          fi
          echo "No large files detected."
